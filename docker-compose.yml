services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finlytic
      POSTGRES_USER: finlytic
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlytic"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Database=finlytic;Username=finlytic;Password=${DB_PASSWORD:-localdev}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: finlytic-api
      Jwt__Audience: finlytic-app
      Jwt__AccessTokenExpiryMinutes: 15
      Jwt__RefreshTokenExpiryDays: 7
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Gemini__Model: gemini-2.5-flash
      Cors__AllowedOrigins: http://localhost:4200,http://web
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
